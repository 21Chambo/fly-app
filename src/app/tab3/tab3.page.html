<ion-header>
  <ion-toolbar color="primary">
    <ion-title> info </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="info-container">
    <div class="logo-section">
      <ion-icon name="restaurant" class="logo-icon" color="primary"></ion-icon>
      <h1>Restaurante MAGA</h1>
      <p class="slogan">Sabor que enamora</p>
    </div>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Horarios</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-list lines="none">
          <ion-item>
            <ion-icon name="time-outline" slot="start" color="primary"></ion-icon>
            <ion-label>Lunes - Viernes: 11:00 - 22:00</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="time-outline" slot="start" color="primary"></ion-icon>
            <ion-label>Sábado - Domingo: 10:00 - 23:00</ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Contacto</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-list lines="none">
          <ion-item>
            <ion-icon name="call-outline" slot="start" color="primary"></ion-icon>
            <ion-label>+57 322 323 0304</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
            <ion-label>info@maga.com</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="location-outline" slot="start" color="primary"></ion-icon>
            <ion-label>Av. Principal 123, Ciudad Neiva</ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
